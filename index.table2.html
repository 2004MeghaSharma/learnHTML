<!DOCTYPE html>  <!-- batata hai ki ye HTML5 document hai -->
<html lang="en"> <!-- root element, lang="en" = English language -->

<head>
    <meta charset="UTF-8"> <!-- sab characters support karega -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>  <!-- browser tab ka naam -->
</head>
<body>
        <!-- table start -->
    <table border="1">
                <!-- table header section (column headings ke liye) -->
        <thead>
        <tr> <!-- header row -->
        <th>Item</th> <!-- heading cell -->
        <th>Quantity</th>
        <th> Price</th>
        </tr>
        </thead>
        <!-- table body (main data yahan hota hai) -->
         <tbody>
          <tr> 
            <td>apple</td>  <!-- item name -->
            <td>10</td> <!-- quantity -->
            <td>$1.00 </td> <!-- price -->
          </tr>
          <tr> <!-- second data row -->
            <td>orange</td>
            <td>5</td>
            <td>$1.50</td>
          </tr>
          </tbody>
          <tr> <!-- footer row -->
                    <!-- table footer (total / summary ke liye) -->
            <tfoot>
            <td>total</td>
            <td>15</td>
            <td>$2.50</td>
          </tr>
          </tfoot>
    </table> <!--table end-->
</body>
</html>
